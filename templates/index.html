<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>腕時計AI自動解析システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [contenteditable="true"]:focus {
      outline: 2px solid #2563EB;
      outline-offset: -2px;
      background-color: #EFF6FF;
    }
    [contenteditable="true"]:hover {
      background-color: #F8FAFC;
    }
    .log-area {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
    }
    .log-area div {
      padding: 2px 8px;
      border-bottom: 1px solid #F1F5F9;
    }
    .status-badge {
      transition: all 0.3s ease;
    }
    #result-table th {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .row-normal {}
    .row-warning { background-color: #FEF3C7 !important; }
    .row-error { background-color: #FEE2E2 !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-blue-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">腕時計AI自動解析システム</h1>
        <p class="text-blue-200 text-sm mt-1">Watch AI Auto-Analysis System</p>
      </div>
      <div>
        <span id="status-badge" class="status-badge inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-gray-500 text-white">
          待機中
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">

    <!-- ① 入力設定エリア -->
    <section id="input-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h2 class="text-lg font-bold text-gray-800 mb-4">入力設定</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- APIキー -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Gemini APIキー</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <input id="api-key-input" type="password" value=""
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm pr-10"
                placeholder="APIキーを入力（環境変数で設定済みの場合は不要）">
              <button onclick="toggleApiKeyVisibility()" type="button"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xs px-1">
                <span id="api-key-toggle-text">表示</span>
              </button>
            </div>
            <button id="btn-save-apikey" onclick="saveApiKey()"
              class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg transition-colors text-sm whitespace-nowrap">
              設定
            </button>
          </div>
          <p id="api-key-status" class="text-xs text-gray-500 mt-1">確認中...</p>
          <p class="text-xs text-gray-400 mt-0.5">設定したキーはプロジェクト内の .env ファイルに保存されます（再起動後も有効）</p>
        </div>

        <!-- 入力フォルダ -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">入力フォルダ</label>
          <input id="input-dir" type="text" value="./input"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
            placeholder="画像フォルダのパスを入力">
          <p class="text-xs text-gray-500 mt-1">商品画像が入ったフォルダのパスを指定してください</p>
        </div>

        <!-- 処理モード -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">処理モード</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="mode" value="single" checked class="text-blue-600 focus:ring-blue-500">
              <span class="text-sm">通常モード</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="mode" value="batch" class="text-blue-600 focus:ring-blue-500">
              <span class="text-sm">バッチモード<span class="text-gray-400 ml-1">(50%割引)</span></span>
            </label>
          </div>
        </div>

        <!-- 出力形式 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">出力形式</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="format" value="csv" checked class="text-blue-600 focus:ring-blue-500">
              <span class="text-sm">CSV</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="format" value="excel" class="text-blue-600 focus:ring-blue-500">
              <span class="text-sm">Excel</span>
            </label>
          </div>
        </div>
      </div>

      <!-- ボタン -->
      <div class="flex items-center gap-4 mt-6">
        <button id="btn-start" onclick="startAnalysis(false)"
          class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-colors text-lg">
          解析開始
        </button>
        <button id="btn-dryrun" onclick="startAnalysis(true)"
          class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition-colors text-sm">
          ドライラン
        </button>
      </div>
    </section>

    <!-- ② 進捗エリア -->
    <section id="progress-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden">
      <h2 class="text-lg font-bold text-gray-800 mb-4">処理進捗</h2>

      <!-- プログレスバー -->
      <div class="mb-4">
        <div class="flex justify-between text-sm text-gray-600 mb-1">
          <span id="progress-text">0 / 0 商品処理中...</span>
          <span id="progress-time"></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
          <div id="progress-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <!-- 現在処理中 -->
      <div id="current-product" class="text-sm text-gray-600 mb-4"></div>

      <!-- ログ出力 -->
      <div class="border border-gray-200 rounded-lg overflow-hidden">
        <div class="bg-gray-100 px-4 py-2 text-xs font-semibold text-gray-600 border-b">処理ログ</div>
        <div id="log-area" class="log-area h-48 overflow-y-auto bg-gray-50"></div>
      </div>
    </section>

    <!-- ③ 結果テーブルエリア -->
    <section id="result-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">解析結果</h2>
        <div id="result-summary" class="text-sm text-gray-600"></div>
      </div>

      <div class="overflow-x-auto border border-gray-200 rounded-lg" style="max-height: 600px; overflow-y: auto;">
        <table id="result-table" class="min-w-full text-sm">
          <thead>
            <tr class="bg-blue-700 text-white">
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">管理番号</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">カテゴリ番号</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">カテゴリ名</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">タイトル</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">ブランド英字</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">ブランドカナ</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">シリーズ英字</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">シリーズカナ</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">型番</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">素材</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">防水</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">ムーブメント</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">文字盤色</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">針数</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">ケース形状</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">タイトル先頭文言</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">異常内容</th>
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap">ステータス</th>
            </tr>
          </thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- ④ アクションエリア -->
    <section id="action-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden">
      <div class="flex flex-wrap items-center gap-4">
        <button onclick="downloadResults('csv')"
          class="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow-sm transition-colors">
          CSVダウンロード
        </button>
        <button onclick="downloadResults('excel')"
          class="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow-sm transition-colors">
          Excelダウンロード
        </button>
        <button onclick="regenerateAllTitles()"
          class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-sm transition-colors">
          タイトル再生成
        </button>
      </div>
    </section>

  </main>

  <script>
    // グローバル状態
    let currentJobId = null;
    let resultData = [];
    let categoryNames = {};
    let eventSource = null;

    // フィールドキー（テーブル列順）
    const FIELD_KEYS = [
      'management_number', 'category_id', 'category_name', 'title',
      'brand_en', 'brand_kana', 'series_en', 'series_kana',
      'model_number', 'material', 'water_resistance', 'movement_type',
      'dial_color', 'hand_count', 'case_shape',
      'title_prefix', 'abnormality_text', 'status'
    ];

    // 編集可能フィールド（management_numberとstatusは編集不可）
    const EDITABLE_FIELDS = new Set([
      'category_id', 'category_name', 'title',
      'brand_en', 'brand_kana', 'series_en', 'series_kana',
      'model_number', 'material', 'water_resistance', 'movement_type',
      'dial_color', 'hand_count', 'case_shape',
      'title_prefix', 'abnormality_text'
    ]);

    // 初期化: カテゴリ名マスター取得
    fetch('/api/category_names')
      .then(r => r.json())
      .then(data => { categoryNames = data; })
      .catch(e => console.warn('カテゴリ名取得失敗:', e));

    // 初期化: APIキー状態チェック
    checkApiKeyStatus();

    function checkApiKeyStatus() {
      fetch('/api/apikey')
        .then(r => r.json())
        .then(data => {
          const statusEl = document.getElementById('api-key-status');
          if (data.has_key) {
            statusEl.textContent = `設定済み (${data.masked})`;
            statusEl.className = 'text-xs text-green-600 mt-1';
          } else {
            statusEl.textContent = '未設定 — 解析にはAPIキーが必要です';
            statusEl.className = 'text-xs text-red-500 mt-1';
          }
        })
        .catch(() => {
          document.getElementById('api-key-status').textContent = '状態取得失敗';
        });
    }

    function saveApiKey() {
      const input = document.getElementById('api-key-input');
      const key = input.value.trim();
      if (!key) {
        alert('APIキーを入力してください。');
        return;
      }

      const btn = document.getElementById('btn-save-apikey');
      btn.disabled = true;
      btn.textContent = '保存中...';

      fetch('/api/apikey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: key }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          alert('エラー: ' + data.error);
          return;
        }
        const statusEl = document.getElementById('api-key-status');
        statusEl.textContent = `設定完了 (${data.masked})`;
        statusEl.className = 'text-xs text-green-600 mt-1';
        input.value = '';
      })
      .catch(err => {
        alert('APIキー設定エラー: ' + err.message);
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = '設定';
      });
    }

    function toggleApiKeyVisibility() {
      const input = document.getElementById('api-key-input');
      const toggleText = document.getElementById('api-key-toggle-text');
      if (input.type === 'password') {
        input.type = 'text';
        toggleText.textContent = '隠す';
      } else {
        input.type = 'password';
        toggleText.textContent = '表示';
      }
    }

    function setStatus(status) {
      const badge = document.getElementById('status-badge');
      badge.textContent = status;
      if (status === '待機中') {
        badge.className = 'status-badge inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-gray-500 text-white';
      } else if (status === '処理中') {
        badge.className = 'status-badge inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-yellow-500 text-white';
      } else if (status === '完了') {
        badge.className = 'status-badge inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-green-500 text-white';
      } else if (status === 'エラー') {
        badge.className = 'status-badge inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-red-500 text-white';
      }
    }

    function addLog(message, level) {
      const logArea = document.getElementById('log-area');
      const div = document.createElement('div');
      const time = new Date().toLocaleTimeString('ja-JP');
      div.textContent = `[${time}] ${message}`;
      if (level === 'error') {
        div.className = 'text-red-700 bg-red-50';
      } else if (level === 'warning') {
        div.className = 'text-yellow-700 bg-yellow-50';
      }
      logArea.appendChild(div);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function formatTime(seconds) {
      if (!seconds || seconds <= 0) return '';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m > 0 ? `${m}分${s}秒` : `${s}秒`;
    }

    function startAnalysis(dryRun) {
      // UI準備
      const inputDir = document.getElementById('input-dir').value.trim();
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const format = document.querySelector('input[name="format"]:checked').value;

      if (!inputDir) {
        alert('入力フォルダを指定してください。');
        return;
      }

      // ボタン無効化
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-dryrun').disabled = true;
      document.getElementById('btn-start').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('btn-dryrun').classList.add('opacity-50', 'cursor-not-allowed');

      // 進捗エリア表示・リセット
      document.getElementById('progress-section').classList.remove('hidden');
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('action-section').classList.add('hidden');
      document.getElementById('log-area').innerHTML = '';
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-text').textContent = '準備中...';
      document.getElementById('progress-time').textContent = '';
      document.getElementById('current-product').textContent = '';

      setStatus('処理中');
      resultData = [];

      // 前回のSSE接続をクリーンアップ
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }

      addLog(dryRun ? 'ドライランを開始します...' : '解析を開始します...', null);

      // APIコール
      fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input_dir: inputDir,
          mode: mode,
          format: format,
          dry_run: dryRun,
        }),
      })
      .then(r => r.json())
      .then(data => {
        currentJobId = data.job_id;
        addLog(`ジョブ開始: ${data.job_id}`, null);
        listenProgress(data.job_id);
      })
      .catch(err => {
        addLog(`開始エラー: ${err}`, 'error');
        setStatus('エラー');
        enableButtons();
      });
    }

    function listenProgress(jobId) {
      eventSource = new EventSource(`/api/progress/${jobId}`);

      eventSource.onmessage = function(event) {
        const msg = JSON.parse(event.data);

        switch (msg.event) {
          case 'scan_done':
            addLog(msg.message, null);
            document.getElementById('progress-text').textContent = `0 / ${msg.total} 商品処理中...`;
            break;

          case 'product_start':
            document.getElementById('current-product').textContent =
              `処理中: ${msg.product_id}`;
            addLog(msg.message, null);
            break;

          case 'product_done':
            addLog(msg.message, msg.status !== '正常' && msg.status !== 'ドライラン' ? 'warning' : null);
            break;

          case 'log':
            addLog(msg.message, msg.level || null);
            break;

          case 'progress':
            const pct = Math.round((msg.completed / msg.total) * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').textContent =
              `${msg.completed} / ${msg.total} 商品処理完了`;
            const elapsed = formatTime(msg.elapsed);
            const eta = formatTime(msg.eta);
            document.getElementById('progress-time').textContent =
              `経過: ${elapsed}` + (eta ? ` / 残り: 約${eta}` : '');
            break;

          case 'error':
            addLog(msg.message, 'error');
            break;

          case 'complete':
            eventSource.close();
            eventSource = null;
            document.getElementById('progress-bar').style.width = '100%';

            if (msg.error) {
              setStatus('エラー');
              addLog('処理が異常終了しました。', 'error');
            } else {
              setStatus('完了');
              addLog(`処理完了: 合計${msg.total}件 (正常: ${msg.ok}件, エラー/警告: ${msg.errors}件) — ${formatTime(msg.elapsed)}`, null);
              resultData = msg.results || [];
              renderTable(resultData);
              document.getElementById('result-section').classList.remove('hidden');
              document.getElementById('action-section').classList.remove('hidden');
              document.getElementById('result-summary').textContent =
                `合計: ${msg.total}件 | 正常: ${msg.ok}件 | エラー/警告: ${msg.errors}件`;
            }
            enableButtons();
            break;

          case 'heartbeat':
            break;
        }
      };

      eventSource.onerror = function() {
        // SSE接続エラー時のリカバリ
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        addLog('接続が切断されました。', 'warning');
        enableButtons();
      };
    }

    function enableButtons() {
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-dryrun').disabled = false;
      document.getElementById('btn-start').classList.remove('opacity-50', 'cursor-not-allowed');
      document.getElementById('btn-dryrun').classList.remove('opacity-50', 'cursor-not-allowed');
    }

    function getRowClass(status) {
      if (!status || status === '正常' || status === 'ドライラン') return 'row-normal';
      if (status.includes('エラー')) return 'row-error';
      return 'row-warning';
    }

    function renderTable(data) {
      const tbody = document.getElementById('result-tbody');
      tbody.innerHTML = '';

      data.forEach((row, rowIdx) => {
        const tr = document.createElement('tr');
        tr.className = `border-b border-gray-200 hover:bg-gray-50 ${getRowClass(row.status)}`;
        tr.dataset.rowIndex = rowIdx;

        FIELD_KEYS.forEach(key => {
          const td = document.createElement('td');
          td.className = 'px-3 py-2 whitespace-nowrap';
          td.textContent = row[key] || '';

          if (EDITABLE_FIELDS.has(key)) {
            td.contentEditable = 'true';
            td.dataset.field = key;
            td.dataset.rowIndex = rowIdx;

            td.addEventListener('blur', function() {
              const newVal = this.textContent.trim();
              const ri = parseInt(this.dataset.rowIndex);
              const field = this.dataset.field;
              resultData[ri][field] = newVal;

              // カテゴリ番号変更時にカテゴリ名を自動更新
              if (field === 'category_id') {
                const catName = categoryNames[newVal] || '';
                resultData[ri]['category_name'] = catName;
                // 同じ行のカテゴリ名セルを更新
                const catNameCell = tr.querySelector('[data-field="category_name"]');
                if (catNameCell) catNameCell.textContent = catName;
              }
            });

            // Enterキーでフォーカス解除
            td.addEventListener('keydown', function(e) {
              if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
              }
            });
          }

          // タイトル列は少し広めに
          if (key === 'title' || key === 'category_name' || key === 'abnormality_text') {
            td.style.maxWidth = '300px';
            td.style.overflow = 'hidden';
            td.style.textOverflow = 'ellipsis';
            td.title = row[key] || '';
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    function getEditedResults() {
      // テーブルの現在値をresultDataから返す
      return resultData;
    }

    async function downloadResults(format) {
      const results = getEditedResults();
      if (!results || results.length === 0) {
        alert('ダウンロードするデータがありません。');
        return;
      }

      try {
        const response = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ format, results }),
        });

        if (!response.ok) throw new Error('ダウンロードに失敗しました');

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = response.headers.get('Content-Disposition')?.split('filename=')[1]
          || `result.${format === 'excel' ? 'xlsx' : 'csv'}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('ダウンロードエラー: ' + err.message);
      }
    }

    async function regenerateAllTitles() {
      const results = getEditedResults();
      if (!results || results.length === 0) {
        alert('データがありません。');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'タイトル再生成中...';

      try {
        const promises = results.map((row, idx) =>
          fetch('/api/regenerate_title', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(row),
          })
          .then(r => r.json())
          .then(data => {
            resultData[idx].title = data.title;
          })
        );

        await Promise.all(promises);
        renderTable(resultData);
        addLog('タイトルを再生成しました。', null);
      } catch (err) {
        alert('タイトル再生成エラー: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'タイトル再生成';
      }
    }
  </script>
</body>
</html>
